name: Sync Fork

on:
  schedule:
    - cron: '0 */12 * * *' # every 6 hours
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync fork
        run: |
          git remote add upstream https://github.com/cmmartin14/Blueprint-Botanica
          git fetch upstream
          git checkout main
          git merge upstream/main --no-edit
          git push origin main
